services:
  - type: web
    name: vm-tippeside-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: true
      - key: CLIENT_ORIGIN
        value: https://johvik17.github.io
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_DEMO_PASSWORD
        sync: false
      - key: EXTRA_TIPS_DEADLINE
        value: 2026-06-14T16:00:00+02:00
      - key: FOOTBALL_SCORE_SYNC_ENABLED
        value: false
      - key: FOOTBALL_API_PROVIDER
        value: api-football
      - key: FOOTBALL_API_KEY
        sync: false
      - key: FOOTBALL_API_COMPETITION_ID
        value: 1
      - key: FOOTBALL_API_SEASON
        value: 2026
      - key: FOOTBALL_API_BASE_URL
        sync: false
      - key: FOOTBALL_SCORE_IDLE_POLL_MS
        value: 1800000
      - key: FOOTBALL_SCORE_LIVE_POLL_MS
        value: 60000
      - key: FOOTBALL_API_DAILY_LIMIT
        value: 90
